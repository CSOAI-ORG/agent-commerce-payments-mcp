name: agent-commerce-payments-mcp
description: MCP server for agent commerce payments. Features create invoice, process
  payment, escrow funds. From MEOK AI Labs.
version: 1.0.0
tools:
- name: create_invoice
  description: Create an invoice for a commerce transaction with line items, tax,
    and payment terms.
  parameters:
  - name: from_agent
    type: string
    required: true
  - name: to_agent
    type: string
    required: true
  - name: amount
    type: number
    required: true
  - name: currency
    type: string
    required: false
- name: process_payment
  description: Process a payment between buyer and seller with fraud checks and fee
    calculation.
  parameters:
  - name: invoice_id
    type: string
    required: true
- name: escrow_funds
  description: Place funds in escrow for a transaction, holding until conditions are
    met.
  parameters:
  - name: agent_a
    type: string
    required: true
  - name: agent_b
    type: string
    required: true
  - name: amount
    type: number
    required: true
- name: release_escrow
  description: Release escrowed funds to the seller after conditions are verified.
  parameters:
  - name: escrow_id
    type: string
    required: true
  - name: to_agent
    type: string
    required: true
- name: payment_history
  description: Get payment history for a user or transaction, with filtering and totals.
  parameters:
  - name: agent_id
    type: string
    required: true
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
    - apiKey
    properties:
      apiKey:
        type: string
        description: Your MEOK API Key
  commandFunction: "(config) => ({\n  command: 'uvx',\n  args: ['agent-commerce-payments-mcp',\
    \ '--api-key', config.apiKey],\n  env: {\n    MEOK_API_KEY: config.apiKey\n  }\n\
    })"
